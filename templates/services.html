{% extends "base.html" %}

{% block title %}خدمات | الماس کویر{% endblock %}

{% block content %}
<section class="max-w-4xl mx-auto p-6">
  <h1 class="text-2xl font-bold text-orange-600 mb-6">خدمات شرکت الماس کویر</h1>

  {% for service in services %}
    <div class="bg-white shadow rounded-xl p-6 mb-4">
      <h2 class="text-xl font-semibold text-blue-800 mb-2">{{ service.title }}</h2>
      <p class="text-gray-700 leading-relaxed">{{ service.description }}</p>
    </div>
  {% else %}
    <p class="text-center text-gray-500">هیچ خدمتی ثبت نشده است.</p>
  {% endfor %}
</section>
{% endblock %}
