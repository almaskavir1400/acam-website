<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>پیام‌های تماس | پنل مدیریت</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

  <div class="container mx-auto px-4 py-10">
    <h1 class="text-2xl font-bold mb-6 text-center">پیام‌های فرم تماس</h1>

    <div class="text-left mb-4">
      <a href="/admin/logout" class="text-blue-600 hover:underline">خروج از حساب</a>
    </div>

    <table class="w-full bg-white shadow rounded-xl overflow-hidden text-sm text-right">
      <thead class="bg-gray-200">
        <tr>
          <th class="px-4 py-2">نام</th>
          <th class="px-4 py-2">ایمیل</th>
          <th class="px-4 py-2">تلفن</th>
          <th class="px-4 py-2">پیام</th>
          <th class="px-4 py-2">حذف</th>
        </tr>
      </thead>
      <tbody>
        {% for msg in messages %}
        <tr class="border-t">
          <td class="px-4 py-2">{{ msg.name }}</td>
          <td class="px-4 py-2">{{ msg.email }}</td>
          <td class="px-4 py-2">{{ msg.phone }}</td>
          <td class="px-4 py-2">{{ msg.message }}</td>
          <td class="px-4 py-2 text-center">
            <form method="POST" action="/admin/delete/{{ msg.id }}" onsubmit="return confirm('آیا مطمئن هستید؟')">
              <button class="text-red-600 hover:underline">حذف</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

</body>
</html>
