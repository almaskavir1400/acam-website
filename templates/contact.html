{% extends "base.html" %}

{% block title %}تماس با ما | الماس کویر{% endblock %}

{% block content %}
<section class="max-w-3xl mx-auto p-6">
  <h1 class="text-2xl font-bold text-orange-600 mb-6">ارتباط با ما</h1>
  <form id="contact-form" method="POST" class="bg-white p-6 shadow rounded-xl space-y-4">
    <input name="name" type="text" placeholder="نام" class="w-full border px-4 py-2 rounded" required>
    <input name="email" type="email" placeholder="ایمیل" class="w-full border px-4 py-2 rounded" required>
    <input name="phone" type="text" placeholder="شماره تماس" class="w-full border px-4 py-2 rounded">
    <textarea name="message" placeholder="پیام شما..." rows="4" class="w-full border px-4 py-2 rounded" required></textarea>
    <button type="submit" class="bg-orange-600 hover:bg-orange-700 text-white px-4 py-2 rounded">ارسال پیام</button>
  </form>
  <div id="form-message" class="hidden text-green-500 mt-4 font-bold"></div>

  <!-- اسکریپت فرم تماس با ما به روش AJAX -->
<script>
document.getElementById("contact-form").addEventListener("submit", async function (e) {
  e.preventDefault();

  const form = e.target;
  const data = {
    name: form.name.value,
    email: form.email.value,
    phone: form.phone.value,
    message: form.message.value
  };

  const response = await fetch("/api/send-message", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  const result = await response.json();

  const msgBox = document.getElementById("form-message");
  msgBox.innerText = result.message;
  msgBox.classList.remove("hidden");

  setTimeout(() => msgBox.classList.add("hidden"), 5000);
});
</script>

</section>
{% endblock %}
